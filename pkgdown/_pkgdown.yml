url: https://ropengov.github.io/giscoR/

template:
  bootstrap: 5
  package: rogtemplate
  params:
    ganalytics: G-VGVFXGHWRL
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  EuroGeographics:
    href: https://ec.europa.eu/eurostat/web/gisco/geodata/reference-data/administrative-units-statistical-units
  Eurostat:
    href: https://ec.europa.eu/eurostat

repo:
  branch: main

home:
  title: giscoR | Download Eurostat GISCO geospatial data
  description: >
    giscoR helps download global and European geospatial data from the Eurostat
    GISCO (Geographic Information System of the Commission) geodata
    distribution. It also provides lightweight GISCO datasets that can be used
    without additional downloads.

articles:
- title: Get started
  contents:
  - giscoR

reference:
- title: GISCO geodata distribution
  desc: >
    Download [`sf` objects](https://r-spatial.github.io/sf/reference/sf.html)
    from the [GISCO geodata
    distribution](https://ec.europa.eu/eurostat/web/gisco/geodata).
- subtitle: Administrative units
  desc: >
    When administrative data are used for statistical purposes, administrative
    units are the units for which those data are recorded. These units may or
    may not match the statistical units required for analysis.

    See the [copyright
    information](https://ec.europa.eu/eurostat/web/gisco/geodata/administrative-units).
- contents: has_concept("admin")
- subtitle: Statistical units
  desc: >
    A statistical unit is the unit of observation or measurement for which data
    are collected or derived.

    See the [copyright
    information](https://ec.europa.eu/eurostat/web/gisco/geodata/statistical-units).
- contents: has_concept("stats")
- subtitle: Grids
  desc: >
    Download population grids covering the EU and neighbouring countries at
    resolutions from 1 km to 100 km. Grid geometries use EPSG:3035 and
    population variables have year- and country-specific licensing conditions.
- contents: has_concept("grids")
- subtitle: Transport networks
  desc: >
    Download transport network data such as airports and ports.
- contents: has_concept("transport")
- subtitle: Basic service locations
  desc: >
    Download basic service locations, such as education and healthcare
    services. Dataset metadata may specify licensing conditions by country and
    data provider.
- contents: has_concept("services")
- subtitle: Bulk and single-unit downloads
  desc: >
    Download complete archives or individual GISCO spatial units.
- contents: has_concept("downloads")
- subtitle: GISCO database and metadata
  desc: >
    Inspect the static or cached GISCO database and query its metadata.
- contents: has_concept("database")
- subtitle: Attribution and licensing
  desc: >
    Generate attribution text and review licensing information for GISCO data.
- contents: has_concept("attribution")
- title: GISCO API tools
  desc: >
    Query additional [GISCO APIs and
    tools](https://ec.europa.eu/eurostat/web/gisco/tools), including the GISCO
    Address API and GISCO ID service API.
- contents: has_concept("api")
- title: Cache management
  desc: >
    Configure, inspect and clear the local GISCO cache.
- contents: has_concept("cache_utils")
- title: Datasets
  desc: >
    Use lightweight datasets included with **giscoR** without additional
    downloads.
- contents: has_concept("datasets")
- title: About the package
  desc: Package overview and metadata.
- contents:
  - giscoR-package
