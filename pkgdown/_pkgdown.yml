url: https://ropengov.github.io/giscoR/

template:
  bootstrap: 5
  package: rogtemplate
  params:
    ganalytics: G-VGVFXGHWRL
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  EuroGeographics:
    href: https://ec.europa.eu/eurostat/web/gisco/geodata/reference-data/administrative-units-statistical-units
  Eurostat:
    href: https://ec.europa.eu/eurostat

repo:
  branch: main

home:
  title: giscoR | Download geospatial data from Eurostat's GISCO API
  description: >
    giscoR helps download global and European geospatial data from Eurostat's
    GISCO (Geographic Information System of the Commission) database. It also
    provides lightweight GISCO datasets that can be used without downloading
    additional files.

reference:
- title: GISCO geodata
  desc: >
    Download geospatial datasets from the <a
    href="https://ec.europa.eu/eurostat/web/gisco/geodata"
    class="external-link">GISCO geodata distribution</a>. These functions return
    <a href="https://r-spatial.github.io/sf/reference/sf.html"
    class="external-link"><span class="pkg">sf</span></a> objects.
- subtitle: Administrative units
  desc: >
    When administrative data are used for statistical purposes, administrative
    units are the units for which those data are recorded. These units may or
    may not match the statistical units required for analysis.

    See <a
    href="https://ec.europa.eu/eurostat/web/gisco/geodata/administrative-units"
    class="external-link">copyright information</a>.
  contents: has_concept("admin")
- subtitle: Statistical units
  desc: >
    A statistical unit is the unit of observation or measurement for which data
    are collected or derived.

    See <a
    href="https://ec.europa.eu/eurostat/web/gisco/geodata/statistical-units"
    class="external-link">copyright information</a>.
  contents: has_concept("stats")
- subtitle: Grids
  desc: >
    These datasets contain grid cells covering the European land territory at
    resolutions from 1 km to 100 km. Base statistics such as population figures
    are provided for these cells.
  contents: has_concept("grids")
- subtitle: Transport networks
  desc: >
    Download transport network data such as airports and ports.
  contents: has_concept("transport")
- subtitle: Basic services
  desc: >
    Download basic service locations such as education and healthcare services.
  contents: has_concept("services")
- subtitle: Additional downloads
  desc: >
    Download individual unit datasets and other GISCO resources.
  contents: has_concept("extra")
- subtitle: <span class="pkg">giscoR</span> database
  desc: >
    Get the cached GISCO database used by the package and its corresponding
    metadata.
  contents: has_concept("database")
- subtitle: Miscellaneous
  desc: >
    Helpers for attribution and other package utilities.
  contents: has_concept("misc")
- title: GISCO API tools
  desc: >
    Query additional <a href="https://ec.europa.eu/eurostat/web/gisco/tools"
    class="external-link">APIs and tools</a> provided by GISCO.
  contents: has_concept("API tools")
- title: Cache management
  desc: >
    Configure, inspect and clear the local GISCO cache.
  contents: has_concept("cache utilities")
- title: Datasets
  desc: >
    Datasets included in <a href="https://CRAN.R-project.org/package=giscoR"
    class="external-link"><span class="pkg">giscoR</span></a>.
  contents: has_concept("datasets")
- title: About the package
  contents: giscoR-package
- title: Deprecated functions
  desc: These functions will be removed in the future.
  contents: has_concept("deprecated functions")
